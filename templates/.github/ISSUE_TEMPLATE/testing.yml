name: Testing / QA
description: A verification task — unit/contract/flow coverage, a manual QA checklist, or a bug hunt.
title: "QA: "
labels: ["testing"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: QA kind
      options:
        - Unit test coverage
        - Contract suite (status + shape + field names)
        - Flow / end-to-end suite
        - Manual QA checklist
        - Bug hunt
        - Demo rehearsal / final report
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area (if layer-specific)
      options:
        - frontend
        - backend
        - mobile
        - devops
        - all
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What this covers, and any dependency (e.g. "blocked by the unit-test issues").
    validations:
      required: true
  - type: textarea
    id: preconditions
    attributes:
      label: Pre-conditions (for manual QA)
      description: Seed commands, reset steps, named test accounts.
      render: shell
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: One checkbox per scenario; tag each with its source PR. Tick as evidence.
      placeholder: |
        - [ ] Scenario A (#PR) — expected ...
        - [ ] Scenario B (#PR) — expected ...
